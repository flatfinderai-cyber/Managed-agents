name: Copilot PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Copilot dependencies
        run: |
          python -m pip install -r requirements-copilot.txt
          npm install -g @github/copilot@1.0.32

      - name: Generate PR analysis
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/copilot_pr_analysis.py --mode sdk --timeout 300 --output artifacts/copilot-pr-analysis.md

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-pr-analysis
          path: artifacts/copilot-pr-analysis.md

      - name: Comment analysis on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'artifacts/copilot-pr-analysis.md';
            let body = fs.readFileSync(path, 'utf8');
            if (body.length > 60000) {
              body = body.slice(0, 60000) + "\n\n(truncated)";
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Copilot PR Analysis\n\n${body}`,
            });
