name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Affordability engine
        working-directory: packages/affordability
        run: python -m pytest test_engine.py -v

      - name: Compliance scorer
        working-directory: packages/compliance
        run: python -m pytest test_scorer.py -v

      - name: Scraper vertical stack
        working-directory: packages/scraper
        run: python -m pytest test_vertical_stack.py -v
